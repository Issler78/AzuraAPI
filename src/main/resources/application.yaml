spring:
  application:
    name: azura-api
  datasource:
    url: jdbc:postgresql://localhost:5432/azura
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update # Use 'update' for development, 'validate' for production
    show-sql: true
    properties:
      hibernate:
        format_sql: true
jwt:
  key: "${JWT_KEY}"
  expiration: ${JWT_EXPIRATION:900000} # 15 min